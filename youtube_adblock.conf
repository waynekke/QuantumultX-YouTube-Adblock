;
; YouTube 广告跳过规则 — 适用于沉浸式翻译内嵌 YouTube
; 基于抓包数据 quantumult-x-2026-06-16-082646.har 分析编写
;
; === 远程引用方法 ===
; 在圈 X 配置文件的 [rewrite_remote] 段落添加：
; https://raw.githubusercontent.com/minionke0916/QuantumultX-YouTube-Adblock/main/youtube_adblock.conf, tag=YouTube去广告, update-interval=86400, opt-parser=false, enabled=true
;
; 同时确保 [mitm] 段包含下方 hostname：
; hostname = m.youtube.com, www.youtube.com
;

[rewrite_local]

; 屏蔽 Google AdSense 广告请求（adview / interaction / viewthroughconversion）
^https?:\/\/www\.youtube\.com\/pagead\/ url reject-200

; 屏蔽广告统计上报接口
^https?:\/\/m\.youtube\.com\/api\/stats\/ads url reject-200

; 修改 player 接口响应体，移除广告心跳参数，阻止播放器加载广告
^https?:\/\/m\.youtube\.com\/youtubei\/v1\/player url script-response-body https://raw.githubusercontent.com/minionke0916/QuantumultX-YouTube-Adblock/main/youtube_no_ads.js


[mitm]
hostname = m.youtube.com, www.youtube.com
